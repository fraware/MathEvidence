name: Capability or RFC proposal
description: Propose a new capability, semantic change, or cross-cutting protocol RFC
title: "[rfc] "
labels: ["rfc"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Proposal kind
      options:
        - New capability
        - Semantic / IR change
        - Evidence schema change
        - Assurance or claim-strength change
        - Ecosystem boundary / integration
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What real computational bottleneck or reuse problem does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Sketch claim class, evidence shape, checker obligations, and backends.
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What this must not replace or silently promote.
    validations:
      required: true
  - type: checkboxes
    id: process
    attributes:
      label: Process
      options:
        - label: I will add or update a doc under docs/rfcs/ if this is cross-cutting
        - label: I understand Core/IR/Checkers must stay solver-independent
