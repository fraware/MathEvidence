name: Question
description: Ask a clarifying question about trust model, usage, or roadmap
title: "[question] "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Relevant docs you already read (e.g. PROJECT_SPEC §, docs/security/SECURITY_AND_TRUST_MODEL).
    validations:
      required: false
