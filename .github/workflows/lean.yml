# Phase 1: Lake build, import boundaries, sorry/axiom audit.
name: lean

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Validate schemas
        run: python scripts/validate_schemas.py

      - name: Import-boundary check
        run: python scripts/check_import_boundaries.py

      - name: Sorry / axiom audit
        run: python scripts/audit_sorry_axioms.py

      - name: Lake build
        run: lake build

      - name: Regenerate Lean offline fixtures (drift check)
        run: |
          python scripts/generate_lean_offline_fixtures.py
          git diff --exit-code -- MathEvidence/Checkers/RationalEquality/OfflineFixtures.lean
