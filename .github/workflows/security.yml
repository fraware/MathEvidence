# Dependency review, secret scan hooks, static checks, executable adversarial resource cases.
name: security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install -e ".[dev,sympy]" || pip install jsonschema pytest sympy hypothesis

      - name: Import-boundary check (trust boundary)
        run: python scripts/check_import_boundaries.py

      - name: Basic secret pattern scan
        run: |
          python - <<'PY'
          from pathlib import Path
          import re, sys
          patterns = [
              re.compile(r"AKIA[0-9A-Z]{16}"),
              re.compile(r"-----BEGIN (RSA |OPENSSH )?PRIVATE KEY-----"),
          ]
          skip = {".git", ".lake", ".venv"}
          hits = []
          for path in Path(".").rglob("*"):
              if any(p in path.parts for p in skip) or not path.is_file():
                  continue
              if path.suffix.lower() in {".olean", ".png", ".jpg"}:
                  continue
              try:
                  text = path.read_text(encoding="utf-8", errors="ignore")
              except OSError:
                  continue
              for pat in patterns:
                  if pat.search(text):
                      hits.append(str(path))
          if hits:
              print("possible secrets:", *hits, sep="\n  ", file=sys.stderr)
              sys.exit(1)
          print("secret pattern scan ok")
          PY

      - name: LeanLink scaffold note
        run: |
          test -f docs/architecture/leanlink-adapter-review.md
          test -f adapters/mathematica/leanlink.py
          test -f adapters/mathematica/leanlink_fuzz.py
          test -d benchmarks/adversarial/leanlink_fuzz
          echo "LeanLink fuzz stubs present; native bridge disabled by default"

      - name: LeanLink fuzz stubs (bridge stays disabled)
        run: python scripts/run_leanlink_fuzz_stubs.py

      - name: Process isolation doc present
        run: test -f docs/architecture/process-isolation.md

      - name: Executable adversarial (malformed + resource)
        run: python scripts/run_adversarial_executable.py

      - name: Cancel → kill isolation tests
        run: python -m pytest adapters/common/test_isolation.py -q

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
