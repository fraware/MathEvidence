# Phase 0 skeleton: release provenance placeholder (no publish yet).
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-skeleton:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate schemas and build Lean
        run: |
          python scripts/validate_schemas.py
          python scripts/check_import_boundaries.py
          lake build

      - name: Release notes reminder
        run: |
          echo "Phase 0: release.yml verifies build only."
          echo "Later: sign artifacts, attach evidence manifests, publish assurance notes."
