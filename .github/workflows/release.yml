# Release provenance: evidence digests + Lean toolchain / lake commit pins.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-provenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e . || pip install jsonschema

      - name: Validate schemas and build Lean
        run: |
          python scripts/validate_schemas.py
          python scripts/check_import_boundaries.py
          lake build

      - name: Offline replay smoke
        env:
          MATHEVIDENCE_ADAPTER_MODE: fixture
        run: python scripts/offline_replay_python.py

      - name: Generate provenance manifest
        run: |
          mkdir -p dist/provenance
          python scripts/generate_release_provenance.py dist/provenance
          test -f dist/provenance/provenance-manifest.json
          python - <<'PY'
          import json
          from pathlib import Path
          m = json.loads(Path("dist/provenance/provenance-manifest.json").read_text(encoding="utf-8"))
          assert m.get("leanToolchain"), "missing leanToolchain pin"
          assert m.get("gitCommit"), "missing gitCommit"
          lake = m.get("lake") or {}
          assert lake.get("packages"), "missing lake package pins"
          print("provenance ok:", m["leanToolchain"], "files=", len(m.get("evidenceAndBenchmarkFiles") or []))
          PY

      - name: Upload provenance artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-provenance
          path: dist/provenance/provenance-manifest.json

      - name: Release notes reminder
        run: |
          echo "release.yml: provenance manifest generated (evidence digests + Lean/lake pins)."
          echo "Signing / publish remain a later governance step."
